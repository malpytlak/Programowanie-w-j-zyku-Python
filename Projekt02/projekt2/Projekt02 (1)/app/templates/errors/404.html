{% extends "base.html" %}
{% block content %}
<div style="text-align: center; padding: 80px 20px;">
    <div style="font-family: 'Cormorant Garamond', serif; font-size: 7em;
                font-style: italic; color: var(--rose); line-height: 1; margin-bottom: 8px;">404</div>
    <h2 style="font-family: 'Cormorant Garamond', serif; font-style: italic;
               font-size: 1.8em; color: var(--bark); margin-bottom: 6px;">Page not found</h2>
    <p style="color: var(--petal); font-size: 0.95em; margin-bottom: 32px;">
        It seems you've wandered off the enchanted path ✦
    </p>
    <a href="{{ url_for('books.index') }}" class="btn-magic"
       style="background: var(--rose); border-color: var(--petal);">
        Back to catalogue
    </a>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<div style="max-width: 420px; margin: 48px auto;">
    <div class="card-glass">
        <h2 style="font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 2em; text-align: center; margin-bottom: 6px;">Create account</h2>
        <p style="text-align: center; font-size: 0.88em; color: var(--petal); margin-bottom: 28px;">Start building your magical library</p>

        <form method="POST">
            <div style="margin-bottom: 16px;">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div style="margin-bottom: 16px;">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div style="margin-bottom: 16px;">
                <label>Password (min. 6 characters)</label>
                <input type="password" name="password" required>
            </div>
            <div style="margin-bottom: 24px;">
                <label>Repeat password</label>
                <input type="password" name="password2" required>
            </div>
            <button type="submit" class="btn-magic" style="width: 100%; padding: 12px; font-size: 1em; background: var(--rose); border-color: var(--petal);">
                Register ✦
            </button>
        </form>

        <p style="text-align: center; margin-top: 20px; font-size: 0.88em;">
            Already have an account?
            <a href="{{ url_for('auth.login') }}" style="color: var(--petal); font-weight: 600;">Log in</a>
        </p>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Usuń przepis{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body text-center">
                <h2 class="text-danger"><i class="bi bi-exclamation-triangle"></i></h2>
                <h3>Czy na pewno chcesz usunąć ten przepis?</h3>
                <p class="text-muted">„{{ recipe.title }}"</p>
                <p>Ta operacja jest nieodwracalna.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Tak, usuń
                    </button>
                    <a href="{% url 'recipes:recipe_detail' recipe.slug %}" class="btn btn-secondary">Anuluj</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
